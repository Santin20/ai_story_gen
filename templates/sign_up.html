<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link rel="stylesheet" href="{{url_for('static',filename='css/signup.css')}}">
</head>
<body>

<div class="signup-box">

    <h1>Create Account</h1>
    <p>Create your account to continue</p>

    <form action="/signup" method="POST" onsubmit="return valid()">

        <div class="input-box">
            <label>Full Name</label>
            <input
                type="text"
                name="name"
                placeholder="Enter your full name"
                required>
        </div>

        <div class="input-box">
            <label>Email Address</label>
            <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input
                type="password"
                name="password"
                id="pass"
                placeholder="Create a password"
                required>
        </div>

        <div class="input-box">
            <label>Confirm Password</label>
            <input
                type="password"
                name="confirm_password"
                id="cpass"
                placeholder="Confirm your password"
                required>
            <small id="msg"></small>
        </div>

        <button type="submit">
            CREATE ACCOUNT
        </button>

    </form>

    <div class="login">
        Already have an account?
        <a href="{{url_for('sign.signin_page')}}">Sign In</a>
    </div>

</div>

<script>

function valid(){

    let pass = document.getElementById("pass").value;
    let cpass = document.getElementById("cpass").value;
    let msg = document.getElementById("msg");

    if(pass != cpass){

        msg.innerHTML = "❌ Passwords do not match";
        msg.style.color = "#EF4444";

        document.getElementById("cpass").focus();

        return false;
    }

    msg.innerHTML = "";
    return true;

}

// Live validation while typing

document.getElementById("cpass").addEventListener("keyup", function(){

    let pass = document.getElementById("pass").value;
    let cpass = this.value;
    let msg = document.getElementById("msg");

    if(cpass == ""){

        msg.innerHTML = "";

    }
    else if(pass == cpass){

        msg.innerHTML = "✔ Password matched";
        msg.style.color = "#22C55E";

    }
    else{

        msg.innerHTML = "❌ Passwords do not match";
        msg.style.color = "#EF4444";

    }

});

</script>

</body>
</html>
